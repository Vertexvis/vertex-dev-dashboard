pre-commit:
  commands:
    quality-checks:
      run: corepack yarn lefthook run quality-checks --file {staged_files}

quality-checks:
  parallel: true
  commands:
    format:
      glob: "*.{js,jsx,ts,tsx,json,yml,yaml,md,mdx,html,css}"
      run: corepack yarn prettier --check {staged_files}
    lint:
      run: corepack yarn lint
    typecheck:
      run: corepack yarn typecheck
    test:
      run: corepack yarn test --runInBand
