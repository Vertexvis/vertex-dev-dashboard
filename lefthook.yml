pre-commit:
  commands:
    quality-checks:
      run: corepack yarn lefthook run quality-checks

quality-checks:
  parallel: true
  commands:
    format:
      glob: "*.{js,jsx,ts,tsx,json,yml,yaml,md,mdx,html,css}"
      run: corepack yarn format:staged:check
    lint:
      run: corepack yarn lint
    typecheck:
      run: corepack yarn typecheck
    test:
      run: corepack yarn test --runInBand

quality-fix:
  commands:
    format:
      run: corepack yarn format:staged:write
    quality-checks:
      run: corepack yarn lefthook run quality-checks
